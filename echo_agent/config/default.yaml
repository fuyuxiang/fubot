# Echo Agent default configuration
# Override via echo-agent.yaml or ECHO_AGENT_ env vars

workspace: "~/.echo-agent"

channels:
  cli:
    enabled: true
  streamChannels:
    - "telegram"
    - "discord"
    - "slack"
  streamFlushChars: 180
  streamFlushIntervalMs: 1500
  webhook:
    enabled: false
    host: "0.0.0.0"
    port: 8080
    path: "/webhook"
  telegram:
    enabled: false
  discord:
    enabled: false
  cron:
    enabled: false

models:
  defaultModel: ""
  providers: []
  routes: []

tools:
  restrictToWorkspace: true
  exec:
    enabled: true
    timeoutSeconds: 30
  web:
    enabled: true
    searchProvider: "brave"
    searchApiBase: ""
    searchApiKey: ""
  mcpSecurityPolicy: "block"

execution:
  defaultExecutor: "local"
  networkPolicy: "allow"

permissions:
  adminUsers: []
  approval:
    requireApproval: []
    defaultPolicy: "approve"

credentials:
  encryptionKeyEnv: "ECHO_AGENT_CREDENTIAL_KEY"
  requireEncryption: false

session:
  maxHistoryMessages: 500
  expiryHours: 72
  contextWindowTokens: 65536
  introductionEnabled: true
  introductionTemplate: ""

memory:
  enabled: true
  consolidationThreshold: 50
  vectorEnabled: false

knowledge:
  enabled: false
  docsDir: "data/knowledge"
  indexPath: "data/knowledge_index.json"
  autoIndex: true
  chunkSize: 1200
  chunkOverlap: 120
  maxResults: 5
  requireCitations: true

multiAgent:
  enabled: false
  mode: "auto"
  defaultAgent: "general"
  routeThreshold: 0.45
  multiThreshold: 0.62
  maxParallelAgents: 3
  maxIterations: 8
  synthesizeResults: true
  auditPath: "data/multi_agent_dispatch.jsonl"
  agents:
    - id: "general"
      name: "General Assistant"
      description: "General conversation, lightweight reasoning, and fallback handling."
      capabilities: ["general", "chat", "reasoning"]
      keywords: []
      taskTypes: ["chat"]
      toolsAllow: ["read_file", "list_dir", "search_files", "memory", "knowledge_search", "message"]
      priority: 0
    - id: "planner"
      name: "Planning Agent"
      description: "Breaks ambiguous goals into structured plans, milestones, risks, and execution steps."
      capabilities: ["planning", "architecture", "decomposition", "strategy"]
      keywords: ["plan", "planning", "architecture", "roadmap", "方案", "规划", "架构", "拆解", "设计"]
      taskTypes: ["planning"]
      toolsAllow: ["read_file", "list_dir", "search_files", "knowledge_search", "memory", "todo"]
      priority: 20
    - id: "coder"
      name: "Coding Agent"
      description: "Inspects code, implements changes, runs code-oriented tools, and explains technical tradeoffs."
      capabilities: ["code", "debugging", "refactor", "implementation", "tests"]
      keywords: ["code", "bug", "test", "pytest", "python", "typescript", "代码", "报错", "测试", "实现", "修复"]
      taskTypes: ["code"]
      toolsAllow: ["read_file", "write_file", "edit_file", "list_dir", "search_files", "patch", "exec", "execute_code", "process", "todo", "memory"]
      priority: 30
    - id: "researcher"
      name: "Research Agent"
      description: "Searches web and local sources, compares evidence, and returns cited findings."
      capabilities: ["research", "web", "source_analysis", "comparison"]
      keywords: ["search", "latest", "compare", "news", "调研", "搜索", "最新", "比较", "资料", "来源"]
      taskTypes: ["research"]
      toolsAllow: ["web_search", "web_fetch", "knowledge_search", "read_file", "search_files", "memory"]
      priority: 25
    - id: "knowledge"
      name: "Knowledge Agent"
      description: "Answers from internal knowledge, memory, local files, and indexed documents with citations."
      capabilities: ["knowledge", "rag", "memory", "docs", "qa"]
      keywords: ["knowledge", "docs", "document", "policy", "内部知识", "知识库", "文档", "制度", "资料"]
      taskTypes: ["knowledge", "research"]
      toolsAllow: ["knowledge_search", "memory", "read_file", "search_files", "list_dir"]
      priority: 22
    - id: "operator"
      name: "Operations Agent"
      description: "Runs operational commands, diagnostics, scheduled jobs, and system checks with approvals."
      capabilities: ["operations", "shell", "diagnostics", "automation"]
      keywords: ["run", "execute", "deploy", "status", "health", "运行", "执行", "部署", "诊断", "状态"]
      taskTypes: ["operations", "code"]
      toolsAllow: ["exec", "execute_code", "process", "read_file", "list_dir", "search_files", "cronjob", "task", "workflow"]
      priority: 18

compression:
  enabled: true
  triggerRatio: 0.7
  tailBudgetRatio: 0.4
  headProtectCount: 3
  summaryTargetRatio: 0.20
  summaryMinTokens: 2000
  summaryMaxTokens: 12000
  summaryModel: ""
  summaryCooldownSeconds: 600
  toolPruningEnabled: true
  toolPruningTailBudgetRatio: 0.3
  maxCompressionCount: 10

gateway:
  enabled: false
  host: "0.0.0.0"
  port: 9000
  apiPrefix: "/api/v1"
  wsPath: "/ws"
  sessionPolicy:
    mode: "idle"
    dailyResetHour: 4
    idleTimeoutMinutes: 1440
  auth:
    mode: "allowlist"
    allowedUsers: []
    adminUsers: []
    apiTokens: []
    tokenHeader: "X-Echo-Agent-Token"
    pairingTtlSeconds: 300
  platforms: {}
  mediaCacheDir: "data/media_cache"
  mediaCacheMaxMb: 500
  maxAgentCacheSize: 50
  enableProgressiveEdit: true
  hooksDir: ""

scheduler:
  enabled: true
  maxConcurrentJobs: 10

storage:
  backend: "sqlite"
  databasePath: "data/echo_agent.db"

observability:
  logLevel: "INFO"
  traceEnabled: true
